# Serenity BDD Configuration
# Umiestnite do: src/test/resources/serenity.properties

# WebDriver nastavenia
webdriver.driver=chrome
webdriver.base.url=https://example.com

# Chrome options pre CI/CD (GitHub Actions)
webdriver.chrome.driver=chromedriver
chrome.switches=--headless,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--disable-extensions,--no-first-run,--disable-default-apps,--disable-popup-blocking,--disable-translate,--disable-background-timer-throttling,--disable-renderer-backgrounding,--disable-device-discovery-notifications,--user-data-dir=/tmp/chrome-serenity-${random.uuid}

# Chrome pre lokŠlny development (override-ovate?nť)
chrome.switches.local=--start-maximized,--disable-infobars

# Serenity reporty
serenity.project.name=Serenity BDD Tests
serenity.test.root=stepdefinitions
serenity.take.screenshots=FOR_FAILURES
serenity.browser.maximized=false
serenity.restart.browser.for.each=scenario
serenity.timeout=10000

# Cucumber integration
cucumber.features=src/test/resources/features
cucumber.glue=stepdefinitions