name: Maven Build

on:
  push:
    branches: [ main, master ]  # Funguje pre main AJ master
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:           # Umožní manuálne spustenie

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Install Chrome browser
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb

      - name: Set Chrome options for CI
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &

      - name: Build and test
        run: mvn clean compile test
        env:
          CHROME_OPTIONS: "--headless --no-sandbox --disable-dev-shm-usage --disable-gpu --disable-extensions --no-first-run --disable-default-apps --user-data-dir=/tmp/chrome-test-profile"

      - name: Generate Serenity reports
        if: always()
        run: mvn serenity:aggregate

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            target/site/serenity/
            target/surefire-reports/
          retention-days: 30

      - name: Print test summary
        if: always()
        run: |
          echo "Build completed!"
          echo "Check artifacts for detailed reports"